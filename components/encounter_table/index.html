<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: #0e1117; color: #fafafa; font-family: "Source Sans Pro", sans-serif; font-size: 14px; overflow-x: hidden; }
table { width: 100%; border-collapse: collapse; }
thead tr { background: #262730; }
th {
  padding: 10px 14px; text-align: left; font-weight: 600; color: #a0a0b0;
  font-size: 12px; text-transform: uppercase; letter-spacing: 0.5px;
  border-bottom: 1px solid #3d3d4d; cursor: pointer; user-select: none; white-space: nowrap;
}
th:hover { color: #fff; }
th.sorted { color: #7eb8f7; }
th .arrow { margin-left: 5px; opacity: 0.5; }
th.sorted .arrow { opacity: 1; }
td { padding: 9px 14px; border-bottom: 1px solid #1e1e2e; }
.rr:hover { background: #1e2130; cursor: pointer; }
#tip {
  display: none; position: fixed; background: #1e2130; color: #e0e0e0;
  border: 1px solid #3d3d5c; border-radius: 10px; padding: 14px; z-index: 9999;
  width: 200px; box-shadow: 0 6px 24px rgba(0,0,0,0.6); pointer-events: none;
}
#tip .tip-name { font-weight: 700; font-size: 14px; color: #fff; text-align: center; margin-bottom: 4px; }
#tip .tip-moves { font-size: 12px; color: #9ab; line-height: 1.5; }
</style>
</head>
<body>
<div id="tip">
  <div class="tip-name" id="tip-name"></div>
  <div class="tip-moves" id="tip-moves"></div>
</div>
<table id="tbl">
  <thead>
    <tr>
      <th data-key="name">Encounter <span class="arrow">&#x21D5;</span></th>
      <th data-key="count">Times Encountered <span class="arrow">&#x21D5;</span></th>
      <th data-key="avg_dmg">Avg Dmg Taken <span class="arrow">&#x21D5;</span></th>
      <th data-key="avg_turns">Avg Turns <span class="arrow">&#x21D5;</span></th>
      <th data-key="win_rate">Win Rate <span class="arrow">&#x21D5;</span></th>
      <th data-key="acts">Act <span class="arrow">&#x21D5;</span></th>
    </tr>
  </thead>
  <tbody id="tbody"></tbody>
</table>
<script>
  const tip = document.getElementById("tip");
  let sortKey = "count", sortAsc = false;
  let rows = [];

  function toStreamlit(type, data) {
    window.parent.postMessage(Object.assign({ isStreamlitMessage: true, type }, data), "*");
  }
  function setComponentValue(value) { toStreamlit("streamlit:setComponentValue", { value, dataType: "json" }); }
  function setFrameHeight(h)        { toStreamlit("streamlit:setFrameHeight",    { height: h }); }
  function setComponentReady()      { toStreamlit("streamlit:componentReady",    { apiVersion: 1 }); }

  window.addEventListener("message", (event) => {
    if (event.data.type !== "streamlit:render") return;
    rows = event.data.args.enc_stats || [];
    renderRows();
    setFrameHeight(document.body.scrollHeight + 10);
  });

  setComponentReady();

  function renderRows() {
    const sorted = [...rows].sort((a, b) => {
      const av = a[sortKey], bv = b[sortKey];
      const an = parseFloat(av), bn = parseFloat(bv);
      const cmp = isNaN(an) ? String(av).localeCompare(String(bv)) : an - bn;
      return sortAsc ? cmp : -cmp;
    });
    const tbody = document.getElementById("tbody");
    tbody.innerHTML = "";
    sorted.forEach((row) => {
      const tr = document.createElement("tr");
      tr.className = "rr";
      tr.innerHTML =
        "<td>" + row.name + "</td>" +
        "<td>" + row.count + "</td>" +
        "<td>" + row.avg_dmg + "</td>" +
        "<td>" + row.avg_turns + "</td>" +
        "<td>" + row.win_rate + "</td>" +
        "<td>" + row.acts + "</td>";
      tr.addEventListener("mouseenter", () => {
        document.getElementById("tip-name").textContent = row.name;
        document.getElementById("tip-moves").textContent = row.moves ? "Moves: " + row.moves : "";
        tip.style.display = "block";
      });
      tr.addEventListener("mousemove", (e) => {
        tip.style.left = (e.clientX + 16) + "px";
        tip.style.top  = (e.clientY + 16) + "px";
      });
      tr.addEventListener("mouseleave", () => { tip.style.display = "none"; });
      tr.addEventListener("click", () => {
        setComponentValue({ enc_id: row.enc_id, enc_type: row.enc_type });
      });
      tbody.appendChild(tr);
    });
    updateHeaderUI();
  }

  function updateHeaderUI() {
    document.querySelectorAll("th[data-key]").forEach(h => {
      h.classList.remove("sorted");
      h.querySelector(".arrow").innerHTML = "&#x21D5;";
    });
    const a = document.querySelector('th[data-key="' + sortKey + '"]');
    if (a) { a.classList.add("sorted"); a.querySelector(".arrow").innerHTML = sortAsc ? "&#x2191;" : "&#x2193;"; }
  }

  document.querySelectorAll("th[data-key]").forEach(th => {
    th.addEventListener("click", () => {
      sortAsc = th.dataset.key === sortKey ? !sortAsc : false;
      sortKey = th.dataset.key;
      renderRows();
    });
  });
</script>
</body>
</html>

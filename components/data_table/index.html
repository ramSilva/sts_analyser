<!DOCTYPE html>
<html><head><meta charset="utf-8"><style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: #0e1117; color: #fafafa; font-family: "Source Sans Pro", sans-serif; font-size: 14px; overflow-x: hidden; }
.controls { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; }
.controls label { color: #a0a0b0; font-size: 12px; text-transform: uppercase; letter-spacing: 0.5px; }
select { background: #262730; color: #fafafa; border: 1px solid #3d3d4d; border-radius: 6px; padding: 4px 8px; font-size: 13px; cursor: pointer; }
#row-count { color: #a0a0b0; font-size: 12px; margin-left: 4px; }
table { width: 100%; border-collapse: collapse; }
thead tr { background: #262730; }
th { padding: 10px 14px; text-align: left; font-weight: 600; color: #a0a0b0; font-size: 12px; text-transform: uppercase; letter-spacing: 0.5px; border-bottom: 1px solid #3d3d4d; cursor: pointer; user-select: none; white-space: nowrap; }
th:hover { color: #fff; }
th.sorted { color: #7eb8f7; }
th .arrow { margin-left: 5px; opacity: 0.5; }
th.sorted .arrow { opacity: 1; }
td { padding: 9px 14px; border-bottom: 1px solid #1e1e2e; }
tr.rr:hover { background: #1e2130; }
tr.rr.clickable { cursor: pointer; }
.pagination { display: none; align-items: center; gap: 8px; margin-top: 10px; }
.pagination.visible { display: flex; }
.pg-btn { background: #262730; color: #fafafa; border: 1px solid #3d3d4d; border-radius: 6px; padding: 4px 12px; font-size: 13px; cursor: pointer; }
.pg-btn:hover:not(:disabled) { background: #3d3d5c; }
.pg-btn:disabled { opacity: 0.35; cursor: default; }
.pg-info { color: #a0a0b0; font-size: 12px; }
#tip { display: none; position: fixed; background: #1e2130; color: #e0e0e0; border: 1px solid #3d3d5c; border-radius: 10px; padding: 14px; z-index: 9999; width: 240px; box-shadow: 0 6px 24px rgba(0,0,0,.6); pointer-events: none; }
#tip img { width: 72px; height: 72px; object-fit: contain; display: none; margin: 0 auto 10px; }
#tip .tip-name { font-weight: 700; font-size: 14px; color: #fff; text-align: center; margin-bottom: 6px; }
#tip .tip-body { font-size: 12px; line-height: 1.6; color: #9ab; }
</style></head>
<body>
<div id="tip"><img id="tip-img"><div class="tip-name" id="tip-name"></div><div class="tip-body" id="tip-body"></div></div>
<div class="controls">
  <label>Show</label>
  <select id="ps">
    <option value="10">10</option><option value="25">25</option>
    <option value="50">50</option><option value="all">All</option>
  </select>
  <span id="row-count"></span>
</div>
<table><thead><tr id="hdr"></tr></thead><tbody id="tbd"></tbody></table>
<div class="pagination" id="pgn">
  <button class="pg-btn" id="pprev">&#x2190; Prev</button>
  <span class="pg-info" id="pinfo"></span>
  <button class="pg-btn" id="pnext">Next &#x2192;</button>
</div>
<script>
function post(type,data){window.parent.postMessage(Object.assign({isStreamlitMessage:true,type},data),"*");}
function setValue(v){post("streamlit:setComponentValue",{value:v,dataType:"json"});}
function setHeight(h){post("streamlit:setFrameHeight",{height:h});}
function ready(){post("streamlit:componentReady",{apiVersion:1});}
window.addEventListener("message",e=>{if(e.data.type==="streamlit:render")init(e.data.args);});
ready();

const tip=document.getElementById("tip"),tipImg=document.getElementById("tip-img"),
      tipName=document.getElementById("tip-name"),tipBody=document.getElementById("tip-body");
let page=1,sk="",sa=false,cols=[],data=[],clickable=false;

function init(a){
  cols=a.columns||[]; data=a.rows||[]; clickable=!!a.clickable;
  sk=a.default_sort||(cols[0]?cols[0].key:""); sa=false;
  buildHeader(); render();
}

function buildHeader(){
  const hdr=document.getElementById("hdr"); hdr.innerHTML="";
  cols.forEach(c=>{
    const th=document.createElement("th"); th.dataset.key=c.key;
    th.innerHTML=c.label+' <span class="arrow">&#x21D5;</span>';
    th.onclick=()=>{sa=c.key===sk?!sa:false;sk=c.key;page=1;render();};
    hdr.appendChild(th);
  });
}

function numVal(v){const n=parseFloat(v);return isNaN(n)?null:n;}

function render(){
  const sorted=[...data].sort((a,b)=>{
    const col=cols.find(c=>c.key===sk),sk2=(col&&col.sort_key)||sk;
    const av=a[sk2],bv=b[sk2],an=numVal(av),bn=numVal(bv);
    const cmp=an!==null&&bn!==null?an-bn:String(av??"").localeCompare(String(bv??""));
    return sa?cmp:-cmp;
  });

  const psv=document.getElementById("ps").value;
  const lim=psv==="all"?sorted.length:parseInt(psv);
  const total=sorted.length,pages=Math.ceil(total/lim)||1;
  page=Math.min(page,pages);
  const from=(page-1)*lim,slice=sorted.slice(from,from+lim);

  const tbd=document.getElementById("tbd"); tbd.innerHTML="";
  slice.forEach(row=>{
    const tr=document.createElement("tr");
    tr.className="rr"+(clickable?" clickable":"");
    cols.forEach(c=>{const td=document.createElement("td");td.textContent=row[c.key]??"";tr.appendChild(td);});

    const tt=row._tooltip;
    if(tt){
      tr.addEventListener("mouseenter",()=>{
        if(tt.image){tipImg.src=tt.image;tipImg.style.display="block";}else{tipImg.style.display="none";}
        tipName.textContent=tt.name||"";tipBody.textContent=tt.body||"";tip.style.display="block";
      });
      tr.addEventListener("mousemove",e=>{tip.style.left=(e.clientX+16)+"px";tip.style.top=(e.clientY+16)+"px";});
      tr.addEventListener("mouseleave",()=>{tip.style.display="none";});
    }
    if(clickable) tr.addEventListener("click",()=>{
      const d={};Object.keys(row).filter(k=>!k.startsWith("_")).forEach(k=>d[k]=row[k]);setValue(d);
    });
    tbd.appendChild(tr);
  });

  document.querySelectorAll("th[data-key]").forEach(h=>{
    h.classList.remove("sorted");h.querySelector(".arrow").innerHTML="&#x21D5;";
  });
  const ah=document.querySelector('th[data-key="'+sk+'"]');
  if(ah){ah.classList.add("sorted");ah.querySelector(".arrow").innerHTML=sa?"&#x2191;":"&#x2193;";}

  const pgn=document.getElementById("pgn");
  document.getElementById("row-count").textContent=
    psv==="all"||pages<=1?total+" rows":(from+1)+"–"+(from+slice.length)+" of "+total;
  if(psv==="all"||pages<=1){pgn.classList.remove("visible");}
  else{
    pgn.classList.add("visible");
    document.getElementById("pinfo").textContent="Page "+page+" of "+pages;
    document.getElementById("pprev").disabled=page<=1;
    document.getElementById("pnext").disabled=page>=pages;
  }
  setHeight(document.body.scrollHeight+10);
}

document.getElementById("ps").onchange=()=>{page=1;render();};
document.getElementById("pprev").onclick=()=>{page--;render();};
document.getElementById("pnext").onclick=()=>{page++;render();};
</script>
</body></html>
